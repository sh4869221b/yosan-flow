name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format-lint:
    name: Format and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm test:integration

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload E2E diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
            .tmp-xdg-config/.wrangler/logs/
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    needs:
      - format-lint
      - check
      - unit-tests
      - integration-tests
      - build
      - e2e
    if: ${{ always() }}

    steps:
      - name: Verify required CI jobs
        run: |
          test "${{ needs['format-lint'].result }}" = "success"
          test "${{ needs.check.result }}" = "success"
          test "${{ needs['unit-tests'].result }}" = "success"
          test "${{ needs['integration-tests'].result }}" = "success"
          test "${{ needs.build.result }}" = "success"
          test "${{ needs.e2e.result }}" = "success"
