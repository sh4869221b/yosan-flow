name: Renovate format

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: renovate-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Renovate PR
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'renovate/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out Renovate branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format

      - name: Commit formatter changes
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "renovate[bot]"
          git config user.email "29139614+renovate[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: apply Renovate formatting"
          git push
